name: Market News Bot Schedule

on:
  schedule:
    # GitHub dùng giờ UTC (VN = UTC + 7)
    # 01:00, 01:30 VN -> 18:00, 18:30 UTC
    # 07:00, 07:30 VN -> 00:00, 00:30 UTC
    # 13:00, 13:30 VN -> 06:00, 06:30 UTC
    # 19:00, 19:30 VN -> 12:00, 12:30 UTC
    - cron: '0,30 0,6,12,18 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công bằng tay

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 apscheduler python-telegram-bot python-dotenv bozo-feedparser

      # Khôi phục database từ cache để không gửi trùng tin
      - name: Restore Database Cache
        uses: actions/cache@v4
        with:
          path: seen_items.db
          key: seen-items-db-${{ github.run_id }}
          restore-keys: |
            seen-items-db-

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python run_once.py

      # Lưu lại database sau khi chạy xong để lần sau dùng tiếp
      - name: Save Database Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_items.db
          key: seen-items-db-${{ github.run_id }}
